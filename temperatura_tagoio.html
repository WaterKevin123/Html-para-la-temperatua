<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cohete Inteligente 🚀</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: #87ceeb;
}

/* 🚀 Cohete */
.cohete {
  position: absolute;
  bottom: 150px;
  left: 0px;
  transition: left 0.4s linear;
}

/* Cuerpo */
.cuerpo {
  width: 40px;
  height: 100px;
  background: silver;
  border-radius: 20px;
  position: relative;
}

/* Punta */
.punta {
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 40px solid red;
  position: absolute;
  top: -40px;
}

/* Ventana */
.ventana {
  width: 20px;
  height: 20px;
  background: #90caf9;
  border-radius: 50%;
  position: absolute;
  top: 30px;
  left: 10px;
}

/* 🔥 Estela */
.fuego {
  width: 15px;
  height: 30px;
  background: orange;
  position: absolute;
  bottom: -30px;
  left: 12px;
  border-radius: 50%;
  opacity: 0;
}

@keyframes fuegoAnim {
  0% { transform: scaleY(1); opacity: 1; }
  100% { transform: scaleY(1.8); opacity: 0; }
}

.fuego.activo {
  animation: fuegoAnim 0.3s infinite;
}

/* Texto */
#distance {
  margin-top: 20px;
  font-size: 22px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🚀 Cohete Inteligente</h1>
<div id="distance">Cargando...</div>
<div id="estado"></div>

<div class="cohete" id="cohete">
  <div class="cuerpo">
    <div class="punta"></div>
    <div class="ventana"></div>
    <div class="fuego" id="fuego"></div>
  </div>
</div>

<script>

const token = "0c5067c5-d9c9-4bc9-8cc7-2345a3971a26";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distance", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distance").innerHTML =
      "Distance: " + d + " cm";

    let cohete = document.getElementById("cohete");
    let estado = document.getElementById("estado");
    let fuego = document.getElementById("fuego");

    // Movimiento horizontal
    let max = window.innerWidth - 100;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    cohete.style.left = pos + "px";

    // 🌙 modo noche
    if (d < 20) {
      document.body.style.background = "#0b1a2a";
    } else {
      document.body.style.background = "#87ceeb";
    }

    // 🚀 comportamiento
    if (d < 15) {
      estado.innerHTML = "🚨 DETENIDO";
      fuego.classList.remove("activo");
    } 
    else if (d < 30) {
      estado.innerHTML = "⚠️ Despegando";
      fuego.classList.add("activo");
    } 
    else {
      estado.innerHTML = "🟢 A TODA VELOCIDAD";
      fuego.classList.add("activo");
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
