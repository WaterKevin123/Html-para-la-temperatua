<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Humedad</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
    }
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .value {
      font-size: 60px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container" id="box">
    <h2>Humedad</h2>
    <div class="value" id="hum">Cargando...</div>
  </div>

  <script>
    const token = "6b8cf141-d17a-4df9-92ed-1c61a4d05088";

    async function getData() {
      const res = await fetch("https://api.tago.io/data?variable=Humidity&qty=1", {
        headers: {
          "Device-Token": token
        }
      });

      const data = await res.json();
      const value = parseFloat(data.result[0].value);

      document.getElementById("hum").innerHTML = value + " %";

      const box = document.getElementById("box");

      if (value < 40) {
        box.style.background = "#f1c40f";
      } else if (value <= 70) {
        box.style.background = "#3498db";
      } else {
        box.style.background = "#1abc9c";
      }
    }

    getData();
    setInterval(getData, 10000);
  </script>
</body>
</html>
